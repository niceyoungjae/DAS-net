dataset:
  root: C:/test/
  num_workers: 8
  batch_size: 24
  image_size:
  - 512
  - 512
  max_samples: 20000
  max_samples_val: 1000
trainer:
  pretrained_path: checkpoints
  epochs: 50
  optimizer: AdamW
  loss_fn: DiceLoss
  lr: 0.0001
  gpu_id: 0
  scheduler:
    type: ReduceLROnPlateau
    factor: 0.5
    patience: 15
    cooldown: 5
  early_stop:
    patience: 30
    min_delta: 0.001
    mode: min
  checkpoint:
    save_dir: checkpoints/mobileunet
model:
  name: mobileunet
